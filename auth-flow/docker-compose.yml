services:
  postgres:
    image: postgres:16-alpine
    container_name: authflow-postgres
    ports:
      - "5435:5432"
    environment:
      POSTGRES_DB: authflow
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
volumes:
  postgres_data:
    driver: local
